<!DOCTYPE html>
<html>
<head>
	<title>{{title}}</title>
	<script src="https://cdn.jsdelivr.net/npm/@lottiefiles/lottie-player"></script>
	<style>
		body {
			margin: 0;
			padding: 0;
			height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		#loader {
			height: 200px;
			width: 200px;
		}
	</style>
</head>
<body>
	<lottie-player id="loader" src="{{ url_for('static', filename='loading.json') }}"  autoplay loop></lottie-player>
    <h2>Data fetching may take a little time, please bear with us...</h2>
	<script>
        var value = "{{ value }}";
		window.addEventListener("load", function() {
			var xhr = new XMLHttpRequest();
			xhr.open("POST", "/output?videoid=" + encodeURIComponent(value), true);
			xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
			xhr.onreadystatechange = function() {
				if (xhr.readyState === 4 && xhr.status === 200) {
					var response = JSON.parse(xhr.responseText);
                    window.location.href = "/summarize?summary=" + encodeURIComponent(response.summary) + "&highlight=" + encodeURIComponent(response.highlight) + "&transct=" + encodeURIComponent(response.transct) + "&video_info=" + encodeURIComponent(response.video_info);
                }
			};
			xhr.send("value=" + encodeURIComponent(window.location.search.substring(1)));
		});
	</script>
</body>
</html>
